  <rect x="278" y="348" width="44" height="12" rx="3" fill="#D4874A"/>
  <text x="300" y="357.5" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="700" fill="white">NEW in 6G</text>

  <!-- 5 · LOWER-LEFT · AI &amp; Communication  (NEW) -->
  <rect x="120" y="237" width="118" height="56" rx="8"
        fill="#FDFAF4" stroke="#D4874A" stroke-width="1.6"/>
  <text x="179" y="256" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10.5" font-weight="700" fill="#B5541F">AI &amp;</text>
  <text x="179" y="269" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10" fill="#7A6858">Communication</text>
  <rect x="157" y="278" width="44" height="12" rx="3" fill="#D4874A"/>
  <text x="179" y="287.5" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="700" fill="white">NEW in 6G</text>

  <!-- 6 · UPPER-LEFT · Integrated Sensing &amp; Communication  (NEW) -->
  <rect x="120" y="97" width="118" height="56" rx="8"
        fill="#FDFAF4" stroke="#D4874A" stroke-width="1.6"/>
  <text x="179" y="116" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10.5" font-weight="700" fill="#B5541F">Integrated</text>
  <text x="179" y="129" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10" fill="#7A6858">Sensing &amp; Comms</text>
  <rect x="157" y="148" width="44" height="12" rx="3" fill="#D4874A"/>
  <text x="179" y="157.5" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="700" fill="white">NEW in 6G</text>

  <!-- ── Legend ── -->
  <rect x="158" y="381" width="12" height="12" rx="2"
        fill="white" stroke="#B5541F" stroke-width="1.5"/>
  <text x="174" y="391"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="9" fill="#7A6858">Evolved from 5G</text>
  <rect x="302" y="381" width="12" height="12" rx="2"
        fill="#FDFAF4" stroke="#D4874A" stroke-width="1.5"/>
  <text x="318" y="391"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="9" fill="#7A6858">New in IMT-2030</text>
</svg>
