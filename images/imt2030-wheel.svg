<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 410">
  <rect width="600" height="410" fill="#F9F2E8" rx="12"/>

  <!-- ── Spoke lines (drawn first, behind everything) ── -->
  <line x1="300" y1="195" x2="300"  y2="55"  stroke="#CDBDA0" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="300" y1="195" x2="421"  y2="125" stroke="#CDBDA0" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="300" y1="195" x2="421"  y2="265" stroke="#CDBDA0" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="300" y1="195" x2="300"  y2="335" stroke="#CDBDA0" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="300" y1="195" x2="179"  y2="265" stroke="#CDBDA0" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="300" y1="195" x2="179"  y2="125" stroke="#CDBDA0" stroke-width="1.4" stroke-dasharray="4,3"/>

  <!-- ── Centre hub ── -->
  <circle cx="300" cy="195" r="54" fill="#B5541F"/>
  <circle cx="300" cy="195" r="54" fill="none" stroke="#E07040" stroke-width="1.5" opacity="0.4"/>
  <text x="300" y="187" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="13" font-weight="700" fill="white">IMT-2030</text>
  <text x="300" y="204" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10.5" fill="#F0D8B0">6G Vision</text>

  <!-- ══════════════════════════════════════
       NODE CARDS  (118 × 56, centred on node)
       Sienna border = evolved from 5G
       Amber border  = new in IMT-2030
  ══════════════════════════════════════ -->

  <!-- 1 · TOP · Immersive Communication  (evolved from eMBB) -->
  <rect x="241" y="27" width="118" height="56" rx="8"
        fill="white" stroke="#B5541F" stroke-width="1.6"/>
  <text x="300" y="46" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10.5" font-weight="700" fill="#B5541F">Immersive</text>
  <text x="300" y="59" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10" fill="#7A6858">Communication</text>
  <text x="300" y="73" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="8" fill="#A89070">evolved from eMBB</text>

  <!-- 2 · UPPER-RIGHT · Hyper-Reliable Low Latency  (evolved from URLLC) -->
  <rect x="362" y="97" width="118" height="56" rx="8"
        fill="white" stroke="#B5541F" stroke-width="1.6"/>
  <text x="421" y="116" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10.5" font-weight="700" fill="#B5541F">Hyper-Reliable</text>
  <text x="421" y="129" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10" fill="#7A6858">Low Latency</text>
  <text x="421" y="143" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="8" fill="#A89070">evolved from URLLC</text>

  <!-- 3 · LOWER-RIGHT · Massive Communication  (evolved from mMTC) -->
  <rect x="362" y="237" width="118" height="56" rx="8"
        fill="white" stroke="#B5541F" stroke-width="1.6"/>
  <text x="421" y="256" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10.5" font-weight="700" fill="#B5541F">Massive</text>
  <text x="421" y="269" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
        font-size="10" fill="#7A6858">Communication</text>
  <text x="421" y="283" text-anchor="middle"
        font-family="'-apple-system','Segoe UI',Arial,sans-serif"
