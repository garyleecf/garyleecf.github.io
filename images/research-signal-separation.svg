<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170">
  <rect width="220" height="170" fill="#F9F2E8" rx="12"/>
  <text x="110" y="20" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="0.09em" fill="#A89070">SIGNAL SEPARATION</text>

  <!-- Left panel: mixed signals -->
  <rect x="10" y="28" width="86" height="86" rx="7" fill="#ffffff" stroke="#CDBDA0" stroke-width="1"/>
  <text x="53" y="44" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="7.5" fill="#C8B098">mixed</text>
  <!-- Wave A -->
  <path d="M 16 72 C 24 54 28 54 36 72 C 44 90 48 90 56 72 C 64 54 68 54 76 72 C 80 81 82 85 88 82"
        fill="none" stroke="#B5541F" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Wave B (different frequency, overlapping) -->
  <path d="M 16 72 C 29 98 37 46 50 72 C 63 98 71 46 84 72 C 87 81 88 85 92 82"
        fill="none" stroke="#D4874A" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Arrow -->
  <path d="M 100 71 L 116 71" stroke="#CDBDA0" stroke-width="2" stroke-linecap="round"/>
  <polygon points="112,67 120,71 112,75" fill="#CDBDA0"/>

  <!-- Right panel: separated signals -->
  <rect x="122" y="28" width="90" height="86" rx="7" fill="#ffffff" stroke="#CDBDA0" stroke-width="1"/>
  <text x="167" y="44" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="7.5" fill="#C8B098">separated</text>
  <!-- Clean wave A -->
  <path d="M 128 58 C 136 44 140 44 148 58 C 156 72 160 72 168 58 C 176 44 180 44 188 58 C 192 65 194 69 200 65"
        fill="none" stroke="#B5541F" stroke-width="2" stroke-linecap="round"/>
  <!-- Clean wave B -->
  <path d="M 128 96 C 140 112 148 80 160 96 C 172 112 180 80 192 96 C 196 102 198 106 204 103"
        fill="none" stroke="#D4874A" stroke-width="2" stroke-linecap="round"/>

  <!-- Caption -->
  <text x="110" y="132" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#B5541F">Unmixing RF Signals</text>
  <text x="110" y="148" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="9" fill="#7A6858">data-driven interference rejection</text>
</svg>
