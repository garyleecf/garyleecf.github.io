<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170">
  <rect width="220" height="170" fill="#f4f9fb" rx="12"/>
  <text x="110" y="20" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="0.09em" fill="#9aacb3">REINFORCEMENT LEARNING</text>

  <!-- Agent box -->
  <rect x="12" y="42" width="76" height="54" rx="9" fill="#2f7f93"/>
  <text x="50" y="63" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" font-weight="600" fill="white">Agent</text>
  <text x="50" y="80" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#a8d5e5">policy π(a|s)</text>

  <!-- Network / Environment box -->
  <rect x="132" y="42" width="76" height="54" rx="9" fill="white" stroke="#52adc8" stroke-width="1.5"/>
  <!-- Antenna icon -->
  <line x1="170" y1="84" x2="170" y2="72" stroke="#2f7f93" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="75" x2="175" y2="75" stroke="#2f7f93" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 175 72 Q 180 69 180 77 Q 180 85 175 82" fill="none" stroke="#52adc8" stroke-width="1.4"/>
  <path d="M 165 72 Q 160 69 160 77 Q 160 85 165 82" fill="none" stroke="#52adc8" stroke-width="1.4"/>
  <text x="170" y="65" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#2f7f93">Network</text>

  <!-- Action arrow: Agent → Network -->
  <path d="M 88 57 L 132 57" stroke="#2f7f93" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="128,53 136,57 128,61" fill="#2f7f93"/>
  <text x="110" y="52" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#2f7f93">action</text>

  <!-- State + Reward arrow: Network → Agent -->
  <path d="M 132 81 L 88 81" stroke="#52adc8" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="92,77 84,81 92,85" fill="#52adc8"/>
  <text x="110" y="96" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#52adc8">reward, state</text>

  <!-- Learning curve mini-chart -->
  <rect x="12" y="107" width="196" height="38" rx="6" fill="white" stroke="#d4e9f0" stroke-width="1"/>
  <!-- Y-axis tick label -->
  <text x="20" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#9aacb3">R</text>
  <!-- Reward curve (improving over time) -->
  <path d="M 28 138 Q 55 136 72 128 Q 96 118 120 114 Q 148 110 170 108 Q 186 107 198 106"
        fill="none" stroke="#52adc8" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Caption -->
  <text x="110" y="157" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#2f7f93">Sequential Decision-Making</text>
</svg>
