<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170">
  <rect width="220" height="170" fill="#F9F2E8" rx="12"/>
  <text x="110" y="20" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="0.09em" fill="#A89070">REINFORCEMENT LEARNING</text>

  <!-- Agent box -->
  <rect x="12" y="42" width="76" height="54" rx="9" fill="#B5541F"/>
  <text x="50" y="63" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="12.5" font-weight="600" fill="white">Agent</text>
  <text x="50" y="80" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F0D8B0">policy π(a|s)</text>

  <!-- Network / Environment box -->
  <rect x="132" y="42" width="76" height="54" rx="9" fill="#ffffff" stroke="#D4874A" stroke-width="1.5"/>
  <text x="170" y="54" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#B5541F">Network</text>

  <!-- 3-sector base station (compact, same style as 5G/6G figure) -->
  <!-- Cross arm -->
  <line x1="155" y1="76" x2="185" y2="76" stroke="#7A6858" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mast -->
  <line x1="170" y1="76" x2="170" y2="89" stroke="#7A6858" stroke-width="2" stroke-linecap="round"/>
  <!-- Equipment base -->
  <rect x="166" y="87" width="8" height="4" rx="1" fill="#D4874A" opacity="0.65"/>
  <!-- Left sector panel -->
  <rect x="151" y="62" width="6" height="14" rx="1" fill="#B5541F"/>
  <line x1="154" y1="64" x2="154" y2="74" stroke="white" stroke-width="0.8" opacity="0.45"/>
  <line x1="151" y1="67" x2="157" y2="67" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="151" y1="71" x2="157" y2="71" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <!-- Center sector panel (taller) -->
  <rect x="167" y="57" width="6" height="19" rx="1" fill="#B5541F"/>
  <line x1="170" y1="59" x2="170" y2="74" stroke="white" stroke-width="0.8" opacity="0.45"/>
  <line x1="167" y1="63" x2="173" y2="63" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="167" y1="67" x2="173" y2="67" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="167" y1="71" x2="173" y2="71" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <!-- Right sector panel -->
  <rect x="183" y="62" width="6" height="14" rx="1" fill="#B5541F"/>
  <line x1="186" y1="64" x2="186" y2="74" stroke="white" stroke-width="0.8" opacity="0.45"/>
  <line x1="183" y1="67" x2="189" y2="67" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="183" y1="71" x2="189" y2="71" stroke="white" stroke-width="0.7" opacity="0.35"/>

  <!-- Action arrow: Agent → Network (top) -->
  <path d="M 88 60 L 132 60" stroke="#B5541F" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="128,56 136,60 128,64" fill="#B5541F"/>
  <text x="110" y="55" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#B5541F">action</text>

  <!-- State + Reward arrow: Network → Agent (bottom) -->
  <path d="M 132 78 L 88 78" stroke="#D4874A" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="92,74 84,78 92,82" fill="#D4874A"/>
  <text x="110" y="91" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#D4874A">reward</text>
  <text x="110" y="101" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#D4874A">state</text>

  <!-- Learning curve mini-chart -->
  <rect x="12" y="107" width="196" height="38" rx="6" fill="#ffffff" stroke="#CDBDA0" stroke-width="1"/>
  <!-- Subtle axes -->
  <line x1="22" y1="111" x2="22" y2="141" stroke="#CDBDA0" stroke-width="0.8" opacity="0.6"/>
  <line x1="22" y1="141" x2="204" y2="141" stroke="#CDBDA0" stroke-width="0.8" opacity="0.6"/>
  <!-- Area fill under curve -->
  <path d="M 22 141 C 58 141 76 111 130 111 L 204 111 L 204 141 Z"
        fill="#D4874A" opacity="0.08"/>
  <!-- S-shaped learning curve: flat start → steep rise → plateau -->
  <path d="M 22 141 C 58 141 76 111 130 111 L 204 111"
        fill="none" stroke="#D4874A" stroke-width="1.9" stroke-linecap="round"/>

  <!-- Caption -->
  <text x="110" y="157" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#B5541F">Sequential Decision-Making</text>
</svg>
