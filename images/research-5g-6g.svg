<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170">
  <rect width="220" height="170" fill="#F9F2E8" rx="12"/>
  <text x="110" y="20" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="0.09em" fill="#A89070">5G / 6G SYSTEMS</text>

  <!-- Ground line -->
  <line x1="14" y1="122" x2="206" y2="122" stroke="#CDBDA0" stroke-width="1.5"/>

  <!-- ===== 5G gNB: lattice tower + 3-sector panel array ===== -->
  <!-- Equipment shelter (sits on ground) -->
  <rect x="76" y="112" width="16" height="10" rx="1.5" fill="white" stroke="#D4874A" stroke-width="1.2"/>
  <line x1="76" y1="117" x2="92" y2="117" stroke="#CDBDA0" stroke-width="0.7"/>
  <circle cx="90" cy="114.5" r="1.5" fill="#D4874A"/>
  <circle cx="90" cy="119.5" r="1.5" fill="#D4874A" opacity="0.5"/>

  <!-- Lattice tower (tapered trapezoid with X-bracing) -->
  <polygon points="79,112 83,76 85,76 89,112" fill="#8B7355" opacity="0.72"/>
  <line x1="79.5" y1="104" x2="88.5" y2="98"  stroke="#7A6858" stroke-width="0.9" opacity="0.6"/>
  <line x1="79.5" y1="98"  x2="88.5" y2="104" stroke="#7A6858" stroke-width="0.9" opacity="0.6"/>
  <line x1="80.5" y1="92"  x2="87.5" y2="86"  stroke="#7A6858" stroke-width="0.9" opacity="0.6"/>
  <line x1="80.5" y1="86"  x2="87.5" y2="92"  stroke="#7A6858" stroke-width="0.9" opacity="0.6"/>

  <!-- Cross arm at top of tower -->
  <line x1="63" y1="76" x2="105" y2="76" stroke="#7A6858" stroke-width="2" stroke-linecap="round"/>

  <!-- Left sector panel (120°) -->
  <rect x="60" y="56" width="8" height="20" rx="1.5" fill="#B5541F"/>
  <line x1="63" y1="58" x2="63" y2="74" stroke="white" stroke-width="0.9" opacity="0.45"/>
  <line x1="66" y1="58" x2="66" y2="74" stroke="white" stroke-width="0.9" opacity="0.45"/>
  <line x1="60" y1="63" x2="68" y2="63" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="60" y1="68" x2="68" y2="68" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="60" y1="73" x2="68" y2="73" stroke="white" stroke-width="0.7" opacity="0.35"/>

  <!-- Center sector panel (0°, forward-facing, beam origin) — tallest -->
  <rect x="80" y="48" width="8" height="28" rx="1.5" fill="#B5541F"/>
  <line x1="83" y1="50" x2="83" y2="74" stroke="white" stroke-width="0.9" opacity="0.45"/>
  <line x1="86" y1="50" x2="86" y2="74" stroke="white" stroke-width="0.9" opacity="0.45"/>
  <line x1="80" y1="55" x2="88" y2="55" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="80" y1="60" x2="88" y2="60" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="80" y1="65" x2="88" y2="65" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="80" y1="70" x2="88" y2="70" stroke="white" stroke-width="0.7" opacity="0.35"/>

  <!-- Right sector panel (240°) -->
  <rect x="100" y="56" width="8" height="20" rx="1.5" fill="#B5541F"/>
  <line x1="103" y1="58" x2="103" y2="74" stroke="white" stroke-width="0.9" opacity="0.45"/>
  <line x1="106" y1="58" x2="106" y2="74" stroke="white" stroke-width="0.9" opacity="0.45"/>
  <line x1="100" y1="63" x2="108" y2="63" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="100" y1="68" x2="108" y2="68" stroke="white" stroke-width="0.7" opacity="0.35"/>
  <line x1="100" y1="73" x2="108" y2="73" stroke="white" stroke-width="0.7" opacity="0.35"/>

  <!-- Beamforming beams -->
  <path d="M 84 65 L 36 112 L 46 118 Z" fill="#E8C080" opacity="0.4"/>
  <line x1="84" y1="65" x2="36" y2="112" stroke="#D4874A" stroke-width="1" opacity="0.7"/>
  <path d="M 84 65 L 148 100 L 143 108 Z" fill="#E8C080" opacity="0.3"/>
  <line x1="84" y1="65" x2="148" y2="100" stroke="#D4874A" stroke-width="1" opacity="0.6"/>
  <path d="M 84 65 L 182 82 L 180 90 Z" fill="#E8C080" opacity="0.22"/>
  <line x1="84" y1="65" x2="182" y2="82" stroke="#D4874A" stroke-width="1" opacity="0.5"/>

  <!-- UE device 1 -->
  <rect x="32" y="106" width="16" height="24" rx="3" fill="white" stroke="#D4874A" stroke-width="1.4"/>
  <line x1="37" y1="109" x2="43" y2="109" stroke="#CDBDA0" stroke-width="1"/>
  <rect x="35" y="113" width="10" height="12" rx="1" fill="#F9F2E8"/>

  <!-- UE device 2 -->
  <rect x="140" y="100" width="14" height="22" rx="3" fill="white" stroke="#D4874A" stroke-width="1.4"/>
  <rect x="143" y="105" width="8" height="10" rx="1" fill="#F9F2E8"/>

  <!-- Satellite (top-right): solar panels + body, no dish -->
  <rect x="154" y="36" width="14" height="6" rx="1" fill="#D4874A"/>
  <rect x="182" y="36" width="14" height="6" rx="1" fill="#D4874A"/>
  <line x1="158" y1="36" x2="158" y2="42" stroke="white" stroke-width="0.7"/>
  <line x1="162" y1="36" x2="162" y2="42" stroke="white" stroke-width="0.7"/>
  <line x1="186" y1="36" x2="186" y2="42" stroke="white" stroke-width="0.7"/>
  <line x1="190" y1="36" x2="190" y2="42" stroke="white" stroke-width="0.7"/>
  <rect x="168" y="32" width="18" height="14" rx="3" fill="#B5541F"/>
  <!-- Small dish (compact, no dangling tail) -->
  <ellipse cx="177" cy="47" rx="5" ry="3" fill="none" stroke="#D4874A" stroke-width="1.3"/>
  <line x1="177" y1="44" x2="177" y2="47" stroke="#B5541F" stroke-width="1.2"/>

  <!-- NTN link -->
  <path d="M 174 50 Q 148 76 100 82" fill="none" stroke="#D4874A" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.65"/>
  <text x="147" y="60" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="7.5" fill="#D4874A" text-anchor="middle">NTN</text>

  <!-- Caption -->
  <text x="110" y="140" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#B5541F">Next-Gen Cellular Networks</text>
  <text x="110" y="156" text-anchor="middle" font-family="'-apple-system','Segoe UI',Arial,sans-serif" font-size="9" fill="#7A6858">beamforming, massive MIMO, NTN</text>
</svg>
