<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170">
  <rect width="220" height="170" fill="#f4f9fb" rx="12"/>
  <text x="110" y="20" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="0.09em" fill="#9aacb3">GENERATIVE MODELS</text>

  <!-- Noise input panel -->
  <rect x="8" y="28" width="52" height="82" rx="6" fill="white" stroke="#d4e9f0" stroke-width="1"/>
  <text x="34" y="42" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#c0d8e0">noise z</text>
  <!-- Scattered noise dots -->
  <circle cx="20" cy="54" r="2.2" fill="#b8d9e8"/>
  <circle cx="34" cy="48" r="1.8" fill="#b8d9e8"/>
  <circle cx="48" cy="56" r="2.2" fill="#b8d9e8"/>
  <circle cx="24" cy="64" r="1.6" fill="#b8d9e8"/>
  <circle cx="42" cy="68" r="2" fill="#b8d9e8"/>
  <circle cx="16" cy="74" r="1.8" fill="#b8d9e8"/>
  <circle cx="36" cy="80" r="2.2" fill="#b8d9e8"/>
  <circle cx="50" cy="74" r="1.6" fill="#b8d9e8"/>
  <circle cx="28" cy="88" r="2" fill="#b8d9e8"/>
  <circle cx="46" cy="92" r="1.8" fill="#b8d9e8"/>

  <!-- Arrow 1 -->
  <path d="M 63 70 L 76 70" stroke="#b8d9e8" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="73,66 80,70 73,74" fill="#b8d9e8"/>

  <!-- Neural network panel -->
  <rect x="82" y="28" width="58" height="82" rx="6" fill="white" stroke="#d4e9f0" stroke-width="1"/>
  <text x="111" y="42" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#c0d8e0">model G</text>
  <!-- Layer connections (drawn first, behind nodes) -->
  <line x1="93" y1="56" x2="105" y2="51" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="93" y1="56" x2="105" y2="63" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="93" y1="70" x2="105" y2="63" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="93" y1="70" x2="105" y2="75" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="93" y1="84" x2="105" y2="75" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="93" y1="84" x2="105" y2="87" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="111" y1="51" x2="123" y2="56" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="111" y1="63" x2="123" y2="56" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="111" y1="63" x2="123" y2="70" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="111" y1="75" x2="123" y2="70" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="111" y1="75" x2="123" y2="84" stroke="#e0eef3" stroke-width="0.9"/>
  <line x1="111" y1="87" x2="123" y2="84" stroke="#e0eef3" stroke-width="0.9"/>
  <!-- Input layer (3 nodes) -->
  <circle cx="93" cy="56" r="5" fill="#a8d5e5" stroke="#52adc8" stroke-width="1"/>
  <circle cx="93" cy="70" r="5" fill="#a8d5e5" stroke="#52adc8" stroke-width="1"/>
  <circle cx="93" cy="84" r="5" fill="#a8d5e5" stroke="#52adc8" stroke-width="1"/>
  <!-- Hidden layer (4 nodes) -->
  <circle cx="111" cy="51" r="5" fill="#52adc8" stroke="#2f7f93" stroke-width="1"/>
  <circle cx="111" cy="63" r="5" fill="#52adc8" stroke="#2f7f93" stroke-width="1"/>
  <circle cx="111" cy="75" r="5" fill="#52adc8" stroke="#2f7f93" stroke-width="1"/>
  <circle cx="111" cy="87" r="5" fill="#52adc8" stroke="#2f7f93" stroke-width="1"/>
  <!-- Output layer (3 nodes) -->
  <circle cx="129" cy="56" r="5" fill="#2f7f93" stroke="#1e5a6b" stroke-width="1"/>
  <circle cx="129" cy="70" r="5" fill="#2f7f93" stroke="#1e5a6b" stroke-width="1"/>
  <circle cx="129" cy="84" r="5" fill="#2f7f93" stroke="#1e5a6b" stroke-width="1"/>

  <!-- Arrow 2 -->
  <path d="M 143 70 L 156 70" stroke="#b8d9e8" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="153,66 160,70 153,74" fill="#b8d9e8"/>

  <!-- Output RF signal panel -->
  <rect x="162" y="28" width="52" height="82" rx="6" fill="white" stroke="#d4e9f0" stroke-width="1"/>
  <text x="188" y="42" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#c0d8e0">RF signal</text>
  <!-- Clean RF waveform (OFDM-like) -->
  <path d="M 166 70 C 170 56 174 56 178 70 C 182 84 186 84 190 70 C 194 56 198 56 202 70 C 206 84 210 84 214 70"
        fill="none" stroke="#2f7f93" stroke-width="2" stroke-linecap="round"/>

  <!-- Caption -->
  <text x="110" y="129" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#2f7f93">Score-based RF Generation</text>
  <text x="110" y="145" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a8288">learning and sampling RF distributions</text>
</svg>
