<figure style="margin: 1.8em 0 1.4em;">
<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;display:block;margin:0 auto;font-family:Georgia,serif;">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a7a9a"/>
    </marker>
    <marker id="arrow-los" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a5a8a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" fill="#f8f6f2" rx="6"/>

  <!-- Buildings -->
  <rect x="180" y="80" width="55" height="110" fill="#d4cfc8" stroke="#b0a898" stroke-width="1"/>
  <rect x="185" y="88" width="12" height="16" fill="#a8c4d8" opacity="0.7"/>
  <rect x="203" y="88" width="12" height="16" fill="#a8c4d8" opacity="0.7"/>
  <rect x="221" y="88" width="9" height="16" fill="#a8c4d8" opacity="0.7"/>
  <rect x="185" y="114" width="12" height="16" fill="#a8c4d8" opacity="0.7"/>
  <rect x="203" y="114" width="12" height="16" fill="#a8c4d8" opacity="0.7"/>
  <rect x="221" y="114" width="9" height="16" fill="#a8c4d8" opacity="0.7"/>
  <rect x="185" y="140" width="12" height="16" fill="#a8c4d8" opacity="0.4"/>
  <rect x="203" y="140" width="12" height="16" fill="#a8c4d8" opacity="0.4"/>

  <rect x="420" y="50" width="60" height="140" fill="#d4cfc8" stroke="#b0a898" stroke-width="1"/>
  <rect x="425" y="58" width="13" height="18" fill="#a8c4d8" opacity="0.7"/>
  <rect x="445" y="58" width="13" height="18" fill="#a8c4d8" opacity="0.7"/>
  <rect x="465" y="58" width="10" height="18" fill="#a8c4d8" opacity="0.7"/>
  <rect x="425" y="86" width="13" height="18" fill="#a8c4d8" opacity="0.7"/>
  <rect x="445" y="86" width="13" height="18" fill="#a8c4d8" opacity="0.7"/>
  <rect x="425" y="114" width="13" height="18" fill="#a8c4d8" opacity="0.4"/>
  <rect x="445" y="114" width="13" height="18" fill="#a8c4d8" opacity="0.4"/>

  <rect x="300" y="160" width="70" height="60" fill="#d4cfc8" stroke="#b0a898" stroke-width="1"/>
  <rect x="306" y="167" width="12" height="14" fill="#a8c4d8" opacity="0.5"/>
  <rect x="324" y="167" width="12" height="14" fill="#a8c4d8" opacity="0.5"/>
  <rect x="342" y="167" width="12" height="14" fill="#a8c4d8" opacity="0.5"/>
  <rect x="360" y="167" width="6" height="14" fill="#a8c4d8" opacity="0.5"/>

  <!-- Ground -->
  <line x1="40" y1="220" x2="660" y2="220" stroke="#c0b8a8" stroke-width="1.5"/>

  <!-- TX antenna -->
  <line x1="80" y1="220" x2="80" y2="145" stroke="#4a6a8a" stroke-width="2.5"/>
  <circle cx="80" cy="142" r="5" fill="#4a6a8a"/>
  <line x1="68" y1="155" x2="80" y2="145" stroke="#4a6a8a" stroke-width="2"/>
  <line x1="92" y1="155" x2="80" y2="145" stroke="#4a6a8a" stroke-width="2"/>
  <line x1="68" y1="168" x2="80" y2="155" stroke="#4a6a8a" stroke-width="1.5"/>
  <line x1="92" y1="168" x2="80" y2="155" stroke="#4a6a8a" stroke-width="1.5"/>
  <text x="80" y="238" text-anchor="middle" font-size="11" fill="#4a6a8a" font-weight="bold">TX</text>

  <!-- RX antenna -->
  <line x1="620" y1="220" x2="620" y2="155" stroke="#7a4a2a" stroke-width="2.5"/>
  <circle cx="620" cy="152" r="5" fill="#7a4a2a"/>
  <line x1="608" y1="165" x2="620" y2="155" stroke="#7a4a2a" stroke-width="2"/>
  <line x1="632" y1="165" x2="620" y2="155" stroke="#7a4a2a" stroke-width="2"/>
  <line x1="608" y1="178" x2="620" y2="165" stroke="#7a4a2a" stroke-width="1.5"/>
  <line x1="632" y1="178" x2="620" y2="165" stroke="#7a4a2a" stroke-width="1.5"/>
  <text x="620" y="238" text-anchor="middle" font-size="11" fill="#7a4a2a" font-weight="bold">RX</text>

  <!-- Line of sight path -->
  <line x1="88" y1="153" x2="612" y2="158" stroke="#2a5a8a" stroke-width="2.2" stroke-dasharray="none" marker-end="url(#arrow-los)"/>
  <text x="350" y="148" text-anchor="middle" font-size="10" fill="#2a5a8a" font-style="italic">line of sight</text>

  <!-- Reflected path 1: bounce off left building -->
  <polyline points="85,148 175,95 415,95 612,160" fill="none" stroke="#5a7a9a" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="290" y="82" text-anchor="middle" font-size="10" fill="#5a7a9a" font-style="italic">reflected</text>

  <!-- Reflected path 2: bounce off right building -->
  <polyline points="82,150 310,230 418,190 612,162" fill="none" stroke="#7a9ab0" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- Diffracted path: over low building -->
  <polyline points="86,150 335,152 615,158" fill="none" stroke="#9aafbf" stroke-width="1.3" stroke-dasharray="3,5" marker-end="url(#arrow)"/>

  <!-- Delay labels -->
  <text x="350" y="268" text-anchor="middle" font-size="10" fill="#888" font-style="italic">each path: different delay τ, angle θ, amplitude α</text>
</svg>
<figcaption style="text-align:center;font-size:0.82em;color:#7A6858;margin-top:0.5em;">
  A transmitted signal arrives at the receiver via multiple paths — direct, reflected, and diffracted — each with a different delay, angle of arrival, and amplitude. Classical theory aggregates these into a single Gaussian distribution.
</figcaption>
</figure>
