<figure style="margin: 1.8em 0 1.4em;">
<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;display:block;margin:0 auto;font-family:Georgia,serif;">
  <defs>
    <!-- Blocked region pattern -->
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#c0b0a0" stroke-width="1.2"/>
    </pattern>
  </defs>

  <rect width="700" height="300" fill="#f8f6f2" rx="6"/>

  <!-- Panel dividers -->
  <line x1="233" y1="10" x2="233" y2="280" stroke="#d0c8b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="467" y1="10" x2="467" y2="280" stroke="#d0c8b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ======== PANEL A: Uniform codebook ======== -->
  <g transform="translate(116,148)">
    <!-- Base station dot -->
    <circle cx="0" cy="0" r="6" fill="#4a6a8a"/>
    <text x="0" y="16" text-anchor="middle" font-size="9" fill="#4a6a8a">BS</text>

    <!-- 12 uniform beams, evenly spaced -->
    <!-- beams as thin wedges / lines radiating outward -->
    <g stroke="#4a6a8a" stroke-width="1.3" fill="#4a6a8a" fill-opacity="0.08">
      <!-- Each beam: 30-degree spacing, 80px radius -->
      <path d="M 0,0 L -10,-79 A 80,80 0 0,1 10,-79 Z" opacity="0.7"/>
      <path d="M 0,0 L 30,-74 A 80,80 0 0,1 49,-64 Z" opacity="0.7"/>
      <path d="M 0,0 L 64,-47 A 80,80 0 0,1 74,-27 Z" opacity="0.7"/>
      <path d="M 0,0 L 79,-9 A 80,80 0 0,1 79,9 Z" opacity="0.7"/>
      <path d="M 0,0 L 74,27 A 80,80 0 0,1 64,47 Z" opacity="0.7"/>
      <path d="M 0,0 L 49,64 A 80,80 0 0,1 30,74 Z" opacity="0.7"/>
      <path d="M 0,0 L 10,79 A 80,80 0 0,1 -10,79 Z" opacity="0.7"/>
      <path d="M 0,0 L -30,74 A 80,80 0 0,1 -49,64 Z" opacity="0.7"/>
      <path d="M 0,0 L -64,47 A 80,80 0 0,1 -74,27 Z" opacity="0.7"/>
      <path d="M 0,0 L -79,9 A 80,80 0 0,1 -79,-9 Z" opacity="0.7"/>
      <path d="M 0,0 L -74,-27 A 80,80 0 0,1 -64,-47 Z" opacity="0.7"/>
      <path d="M 0,0 L -49,-64 A 80,80 0 0,1 -30,-74 Z" opacity="0.7"/>
    </g>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#4a6a8a" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>
  </g>
  <text x="116" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">(a) Uniform</text>
  <text x="116" y="270" text-anchor="middle" font-size="10" fill="#888">12 beams, no assumptions</text>

  <!-- ======== PANEL B: Uniform + blocked regions ======== -->
  <g transform="translate(350,148)">
    <circle cx="0" cy="0" r="6" fill="#4a6a8a"/>
    <text x="0" y="16" text-anchor="middle" font-size="9" fill="#4a6a8a">BS</text>

    <!-- Same 12 uniform beams -->
    <g stroke="#4a6a8a" stroke-width="1.3" fill="#4a6a8a" fill-opacity="0.08">
      <path d="M 0,0 L -10,-79 A 80,80 0 0,1 10,-79 Z" opacity="0.7"/>
      <path d="M 0,0 L 30,-74 A 80,80 0 0,1 49,-64 Z" opacity="0.7"/>
      <path d="M 0,0 L 64,-47 A 80,80 0 0,1 74,-27 Z" opacity="0.7"/>
      <path d="M 0,0 L 79,-9 A 80,80 0 0,1 79,9 Z" opacity="0.7"/>
      <path d="M 0,0 L 74,27 A 80,80 0 0,1 64,47 Z" opacity="0.7"/>
      <path d="M 0,0 L 49,64 A 80,80 0 0,1 30,74 Z" opacity="0.7"/>
      <path d="M 0,0 L 10,79 A 80,80 0 0,1 -10,79 Z" opacity="0.7"/>
      <path d="M 0,0 L -30,74 A 80,80 0 0,1 -49,64 Z" opacity="0.7"/>
      <path d="M 0,0 L -64,47 A 80,80 0 0,1 -74,27 Z" opacity="0.7"/>
      <path d="M 0,0 L -79,9 A 80,80 0 0,1 -79,-9 Z" opacity="0.7"/>
      <path d="M 0,0 L -74,-27 A 80,80 0 0,1 -64,-47 Z" opacity="0.7"/>
      <path d="M 0,0 L -49,-64 A 80,80 0 0,1 -30,-74 Z" opacity="0.7"/>
    </g>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#4a6a8a" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>

    <!-- Blocked region overlays: top-left arc and bottom arc -->
    <path d="M 0,0 L -79,-9 A 80,80 0 0,1 -49,-64 Z" fill="url(#hatch)" opacity="0.7"/>
    <path d="M 0,0 L -49,-64 A 80,80 0 0,1 -10,-79 Z" fill="url(#hatch)" opacity="0.7"/>
    <path d="M 0,0 L 10,79 A 80,80 0 0,1 -30,74 Z" fill="url(#hatch)" opacity="0.7"/>
    <path d="M 0,0 L -30,74 A 80,80 0 0,1 -64,47 Z" fill="url(#hatch)" opacity="0.7"/>

    <!-- Blocked label -->
    <text x="-62" y="-28" text-anchor="middle" font-size="8.5" fill="#b08060" font-style="italic">blocked</text>
    <text x="-30" y="86" text-anchor="middle" font-size="8.5" fill="#b08060" font-style="italic">blocked</text>
  </g>
  <text x="350" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">(b) Uniform + environment</text>
  <text x="350" y="270" text-anchor="middle" font-size="10" fill="#888">wasted beams into blocked zones</text>

  <!-- ======== PANEL C: Informed / adapted codebook ======== -->
  <g transform="translate(584,148)">
    <circle cx="0" cy="0" r="6" fill="#2a6a3a"/>
    <text x="0" y="16" text-anchor="middle" font-size="9" fill="#2a6a3a">BS</text>

    <!-- Accessible region: roughly 240 degrees open, same arc as panel B accessible zones -->
    <!-- More beams in accessible region, finer spacing, none in blocked zones -->
    <g stroke="#2a6a3a" stroke-width="1.4" fill="#2a6a3a" fill-opacity="0.10">
      <!-- 12 beams redistributed into ~240 deg open arc -->
      <path d="M 0,0 L 10,-79 A 80,80 0 0,1 30,-74 Z" opacity="0.8"/>
      <path d="M 0,0 L 30,-74 A 80,80 0 0,1 49,-64 Z" opacity="0.8"/>
      <path d="M 0,0 L 49,-64 A 80,80 0 0,1 64,-47 Z" opacity="0.8"/>
      <path d="M 0,0 L 64,-47 A 80,80 0 0,1 74,-27 Z" opacity="0.8"/>
      <path d="M 0,0 L 74,-27 A 80,80 0 0,1 79,-9 Z" opacity="0.8"/>
      <path d="M 0,0 L 79,-9 A 80,80 0 0,1 79,9 Z" opacity="0.8"/>
      <path d="M 0,0 L 79,9 A 80,80 0 0,1 74,27 Z" opacity="0.8"/>
      <path d="M 0,0 L 74,27 A 80,80 0 0,1 64,47 Z" opacity="0.8"/>
      <path d="M 0,0 L 64,47 A 80,80 0 0,1 49,64 Z" opacity="0.8"/>
      <path d="M 0,0 L 49,64 A 80,80 0 0,1 30,74 Z" opacity="0.8"/>
      <path d="M 0,0 L 30,74 A 80,80 0 0,1 10,79 Z" opacity="0.8"/>
      <path d="M 0,0 L 10,-79 A 80,80 0 0,1 -10,-79 Z" opacity="0.8"/>
    </g>

    <!-- Blocked regions: hatched, no beams -->
    <path d="M 0,0 L -79,-9 A 80,80 0 0,1 -49,-64 Z" fill="url(#hatch)" opacity="0.5"/>
    <path d="M 0,0 L -49,-64 A 80,80 0 0,1 -10,-79 Z" fill="url(#hatch)" opacity="0.5"/>
    <path d="M 0,0 L 10,79 A 80,80 0 0,1 -30,74 Z" fill="url(#hatch)" opacity="0.5"/>
    <path d="M 0,0 L -30,74 A 80,80 0 0,1 -64,47 Z" fill="url(#hatch)" opacity="0.5"/>

    <circle cx="0" cy="0" r="80" fill="none" stroke="#2a6a3a" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>
  </g>
  <text x="584" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a6a3a">(c) Informed</text>
  <text x="584" y="270" text-anchor="middle" font-size="10" fill="#888">same beams, concentrated where needed</text>

</svg>
<figcaption style="text-align:center;font-size:0.82em;color:#7A6858;margin-top:0.5em;">
  <strong>Fig. 1</strong> — Codebook design at a massive MIMO base station. (a) Uniform beams across all angles — no assumptions about the environment. (b) The same codebook overlaid with the physical reality: hatched regions are blocked by buildings and cannot support users. Beams pointing there are wasted. (c) An informed codebook reallocates those beams into accessible regions, producing finer angular resolution where it matters. Same number of beams; fundamentally different performance.
</figcaption>
</figure>
