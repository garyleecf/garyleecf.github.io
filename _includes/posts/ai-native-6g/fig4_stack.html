<figure style="margin: 1.8em 0 1.4em;">
<svg viewBox="0 0 700 310" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;display:block;margin:0 auto;font-family:Georgia,serif;">

  <rect width="700" height="310" fill="#f8f6f2" rx="6"/>

  <!-- ======= LEFT SIDE: Classical stack ======= -->
  <text x="175" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Classical Stack</text>

  <!-- Layer boxes: Application, MAC, PHY -->
  <!-- Application -->
  <rect x="50" y="45" width="250" height="48" rx="4" fill="#dce8f0" stroke="#8aaccf" stroke-width="1.5"/>
  <text x="175" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a6a8a">Application / Higher Layers</text>
  <text x="175" y="82" text-anchor="middle" font-size="9.5" fill="#6a8aaa">throughput targets, QoS requirements</text>

  <!-- Interface arrow + label -->
  <line x1="175" y1="93" x2="175" y2="110" stroke="#8aaccf" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Interface contract box 1 -->
  <rect x="85" y="110" width="180" height="26" rx="3" fill="#fff8e8" stroke="#c8a84a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="175" y="127" text-anchor="middle" font-size="9" fill="#9a7a20" font-style="italic">interface: Gaussian channel model</text>

  <!-- MAC -->
  <rect x="50" y="136" width="250" height="48" rx="4" fill="#dce8f0" stroke="#8aaccf" stroke-width="1.5"/>
  <text x="175" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a6a8a">MAC / Scheduler</text>
  <text x="175" y="173" text-anchor="middle" font-size="9.5" fill="#6a8aaa">link adaptation, resource allocation</text>

  <!-- Interface arrow -->
  <line x1="175" y1="184" x2="175" y2="201" stroke="#8aaccf" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Interface contract box 2 -->
  <rect x="60" y="201" width="230" height="26" rx="3" fill="#fff8e8" stroke="#c8a84a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="175" y="213" text-anchor="middle" font-size="9" fill="#9a7a20" font-style="italic">interface: fixed pilot structures,</text>
  <text x="175" y="224" text-anchor="middle" font-size="9" fill="#9a7a20" font-style="italic">uniform feedback codebook</text>

  <!-- PHY -->
  <rect x="50" y="227" width="250" height="48" rx="4" fill="#dce8f0" stroke="#8aaccf" stroke-width="1.5"/>
  <text x="175" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a6a8a">Physical Layer</text>
  <text x="175" y="264" text-anchor="middle" font-size="9.5" fill="#6a8aaa">channel estimation, beamforming</text>

  <!-- Assumption label -->
  <text x="175" y="290" text-anchor="middle" font-size="9" fill="#b08060" font-style="italic">↑ all designed assuming Gaussian channel ↑</text>

  <!-- ======= RIGHT SIDE: AI-native stack ======= -->
  <text x="525" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a5a3a">AI-Native Stack</text>

  <!-- Application -->
  <rect x="400" y="45" width="250" height="48" rx="4" fill="#d8eedd" stroke="#5a9a6a" stroke-width="1.5"/>
  <text x="525" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a6a3a">Application / Higher Layers</text>
  <text x="525" y="82" text-anchor="middle" font-size="9.5" fill="#4a8a5a">throughput targets, QoS requirements</text>

  <!-- Interface arrow -->
  <line x1="525" y1="93" x2="525" y2="110" stroke="#5a9a6a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Interface contract box 1 — redesigned -->
  <rect x="430" y="110" width="190" height="26" rx="3" fill="#eef8f0" stroke="#5a9a6a" stroke-width="1.5"/>
  <text x="525" y="127" text-anchor="middle" font-size="9" fill="#2a6a3a" font-style="italic">interface: learned latent representation</text>

  <!-- MAC -->
  <rect x="400" y="136" width="250" height="48" rx="4" fill="#d8eedd" stroke="#5a9a6a" stroke-width="1.5"/>
  <text x="525" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a6a3a">MAC / Scheduler</text>
  <text x="525" y="173" text-anchor="middle" font-size="9.5" fill="#4a8a5a">AI-informed resource allocation</text>

  <!-- Interface arrow -->
  <line x1="525" y1="184" x2="525" y2="201" stroke="#5a9a6a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Interface contract box 2 — redesigned -->
  <rect x="415" y="201" width="220" height="26" rx="3" fill="#eef8f0" stroke="#5a9a6a" stroke-width="1.5"/>
  <text x="525" y="213" text-anchor="middle" font-size="9" fill="#2a6a3a" font-style="italic">interface: environment-adapted feedback,</text>
  <text x="525" y="224" text-anchor="middle" font-size="9" fill="#2a6a3a" font-style="italic">compressed learned CSI</text>

  <!-- PHY -->
  <rect x="400" y="227" width="250" height="48" rx="4" fill="#d8eedd" stroke="#5a9a6a" stroke-width="1.5"/>
  <text x="525" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a6a3a">Physical Layer</text>
  <text x="525" y="264" text-anchor="middle" font-size="9.5" fill="#4a8a5a">learned channel estimator, adapted codebook</text>

  <!-- Assumption label -->
  <text x="525" y="290" text-anchor="middle" font-size="9" fill="#2a6a3a" font-style="italic">↑ redesigned around learned representations ↑</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8aaccf"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a9a6a"/>
    </marker>
  </defs>

</svg>
<figcaption style="text-align:center;font-size:0.82em;color:#7A6858;margin-top:0.5em;">
  The communications stack, classical (left) versus AI-native (right). In the classical design, the interface contracts between layers — pilot structures, feedback codebook formats, channel representations — were built around the Gaussian assumption. Replacing only the estimator at the physical layer while leaving these contracts unchanged recovers partial gains. Redesigning the contracts alongside the estimator is where the larger gains compound.
</figcaption>
</figure>
