<figure style="margin: 1.8em 0 1.4em;">
<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;display:block;margin:0 auto;font-family:Georgia,serif;">

  <!-- Background -->
  <rect width="700" height="260" fill="#f8f6f2" rx="6"/>

  <!-- Divider -->
  <line x1="350" y1="20" x2="350" y2="240" stroke="#d0c8b8" stroke-width="1.2" stroke-dasharray="4,4"/>

  <!-- Left panel label: Sub-6 GHz -->
  <text x="175" y="38" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a6a8a">Sub-6 GHz</text>
  <text x="175" y="54" text-anchor="middle" font-size="10" fill="#888" font-style="italic">many paths, spread energy</text>

  <!-- Right panel label: mmWave -->
  <text x="525" y="38" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a4a2a">Millimetre-wave</text>
  <text x="525" y="54" text-anchor="middle" font-size="10" fill="#888" font-style="italic">few dominant paths, angular sparsity</text>

  <!-- LEFT: Angular power spectrum (sub-6 GHz) -->
  <!-- X axis: angle -90 to +90 degrees, y axis: power -->
  <!-- Distributed, many peaks of varying height -->
  <g transform="translate(30, 70)">
    <!-- Axes -->
    <line x1="0" y1="150" x2="290" y2="150" stroke="#999" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="150" stroke="#999" stroke-width="1.2"/>

    <!-- X axis labels -->
    <text x="0" y="164" text-anchor="middle" font-size="9" fill="#888">−90°</text>
    <text x="72" y="164" text-anchor="middle" font-size="9" fill="#888">−45°</text>
    <text x="145" y="164" text-anchor="middle" font-size="9" fill="#888">0°</text>
    <text x="218" y="164" text-anchor="middle" font-size="9" fill="#888">+45°</text>
    <text x="290" y="164" text-anchor="middle" font-size="9" fill="#888">+90°</text>

    <!-- Y axis label -->
    <text x="-8" y="75" text-anchor="middle" font-size="9" fill="#888" transform="rotate(-90,-8,75)">power</text>

    <!-- Distributed spectrum: many bumps of moderate height -->
    <path d="M 0,150
      L 8,148 L 14,144 L 20,138 L 26,132 L 32,128
      L 38,134 L 44,140 L 50,136 L 56,130 L 62,122
      L 68,116 L 74,110 L 80,106 L 86,112 L 92,118
      L 98,124 L 104,120 L 110,112 L 116,104 L 122,98
      L 128,94 L 134,100 L 140,108 L 146,104 L 152,96
      L 158,88 L 164,84 L 170,90 L 176,98 L 182,106
      L 188,112 L 194,118 L 200,122 L 206,116 L 212,108
      L 218,100 L 224,106 L 230,114 L 236,120 L 242,128
      L 248,134 L 254,138 L 260,142 L 266,146 L 272,148
      L 280,149 L 290,150"
      fill="#4a6a8a" fill-opacity="0.25" stroke="#4a6a8a" stroke-width="1.5"/>

    <text x="145" y="180" text-anchor="middle" font-size="10" fill="#4a6a8a">angle of arrival</text>
  </g>

  <!-- RIGHT: Angular power spectrum (mmWave) -->
  <!-- Sparse: 2-3 sharp peaks, rest near zero -->
  <g transform="translate(380, 70)">
    <!-- Axes -->
    <line x1="0" y1="150" x2="290" y2="150" stroke="#999" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="150" stroke="#999" stroke-width="1.2"/>

    <!-- X axis labels -->
    <text x="0" y="164" text-anchor="middle" font-size="9" fill="#888">−90°</text>
    <text x="72" y="164" text-anchor="middle" font-size="9" fill="#888">−45°</text>
    <text x="145" y="164" text-anchor="middle" font-size="9" fill="#888">0°</text>
    <text x="218" y="164" text-anchor="middle" font-size="9" fill="#888">+45°</text>
    <text x="290" y="164" text-anchor="middle" font-size="9" fill="#888">+90°</text>

    <!-- Y axis label -->
    <text x="-8" y="75" text-anchor="middle" font-size="9" fill="#888" transform="rotate(-90,-8,75)">power</text>

    <!-- Sparse spectrum: near-zero baseline with 2 sharp peaks -->
    <!-- Baseline noise floor -->
    <path d="M 0,148 L 290,148" fill="none" stroke="#c0956a" stroke-width="0.8" stroke-dasharray="2,2"/>

    <!-- Peak 1: around -30 deg (x ≈ 72) -->
    <path d="M 52,148 L 58,147 L 62,142 L 66,130 L 70,108 L 74,78 L 78,52 L 82,70 L 86,100 L 90,128 L 94,143 L 98,147 L 104,148"
      fill="#c0956a" fill-opacity="0.3" stroke="#c0956a" stroke-width="1.5"/>

    <!-- Peak 2: around +15 deg (x ≈ 172) — LOS, taller -->
    <path d="M 154,148 L 158,146 L 162,138 L 166,116 L 170,82 L 174,42 L 178,18 L 182,40 L 186,78 L 190,110 L 194,134 L 198,145 L 202,148"
      fill="#9a4a1a" fill-opacity="0.35" stroke="#9a4a1a" stroke-width="1.8"/>

    <!-- Peak 3: faint, around +60 deg (x ≈ 240) -->
    <path d="M 228,148 L 232,147 L 236,144 L 240,136 L 244,122 L 248,110 L 252,118 L 256,132 L 260,144 L 264,148"
      fill="#c0956a" fill-opacity="0.2" stroke="#c0956a" stroke-width="1.2"/>

    <!-- Labels on peaks -->
    <text x="78" y="46" text-anchor="middle" font-size="9" fill="#9a6a3a" font-style="italic">reflected</text>
    <text x="178" y="13" text-anchor="middle" font-size="9" fill="#7a3a0a" font-style="italic">LOS</text>
    <text x="250" y="104" text-anchor="middle" font-size="9" fill="#9a6a3a" font-style="italic">reflected</text>

    <text x="145" y="180" text-anchor="middle" font-size="10" fill="#7a4a2a">angle of arrival</text>
  </g>

</svg>
<figcaption style="text-align:center;font-size:0.82em;color:#7A6858;margin-top:0.5em;">
  Angular power spectra at sub-6 GHz (left) and millimetre-wave (right). At sub-6 GHz, energy spreads across many angles. At mmWave, aggressive path loss eliminates most scattering — energy concentrates into a handful of dominant directions. The channel becomes sparse.
</figcaption>
</figure>
